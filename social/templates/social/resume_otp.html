{% extends 'social/base.html' %}

{% block content %}
<div class="card p-4 text-center">
  <div style="font-size: 48px;">📧</div>
  <h4 class="mt-3">Verify Your Email</h4>
  <p class="text-muted">An OTP has been sent to <strong>{{ email }}</strong></p>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'resume_create' %}">
    {% csrf_token %}
    <input type="hidden" name="action" value="verify_otp">
    <div class="mb-3 text-start">
      <label class="form-label">Enter OTP</label>
      <input type="text" name="otp" class="form-control text-center" 
             placeholder="Enter 6-digit OTP" maxlength="6" required
             style="font-size: 24px; letter-spacing: 8px;">
    </div>
    <button type="submit" class="btn btn-primary w-100">Verify OTP & Pay ₹50</button>
  </form>

  <p class="text-muted mt-3 small">Didn't receive OTP? 
    <a href="{% url 'resume_create' %}">Go back and try again</a>
  </p>
</div>
{% endblock %}
