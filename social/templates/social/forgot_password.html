{% extends 'social/base.html' %}

{% block content %}
{% load i18n %}
<div class="card p-4">
  <h4 class="mb-2 text-center">{% trans "Forgot Password 🔑" %}</h4>
  <p class="text-muted text-center mb-4">{% trans "Enter your registered email or phone number to reset your password." %}</p>

  {% if error %}
  <div class="alert alert-warning text-center">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">{% trans "Email or Phone Number" %}</label>
      <input type="text" name="identifier" class="form-control" placeholder="{% trans 'Enter email or phone number' %}" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">{% trans "Reset Password" %}</button>
  </form>

  <p class="text-center mt-3">
    <a href="{% url 'login' %}">{% trans "Back to Login" %}</a>
  </p>
</div>
{% endblock %}
