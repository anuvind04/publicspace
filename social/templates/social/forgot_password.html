{% extends 'social/base.html' %}

{% block content %}
<div class="card p-4">
  <h4 class="mb-2 text-center">Forgot Password 🔑</h4>
  <p class="text-muted text-center mb-4">Enter your registered email or phone number to reset your password.</p>

  {% if error %}
  <div class="alert alert-warning text-center">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Email or Phone Number</label>
      <input type="text" name="identifier" class="form-control" placeholder="Enter email or phone number" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
  </form>

  <p class="text-center mt-3">
    <a href="{% url 'login' %}">Back to Login</a>
  </p>
</div>
{% endblock %}
