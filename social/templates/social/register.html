{% extends 'social/base.html' %}

{% block content %}
{% load i18n %}
<div class="card p-4">
  <h4 class="mb-4 text-center">{% trans "Create Account" %}</h4>
  <form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        <div class="text-danger small">{{ field.errors }}</div>
      {% endif %}
    </div>
    {% endfor %}
    <div class="mb-3">
      <label class="form-label">{% trans "Email Address" %} <span class="text-danger">*</span></label>
      <input type="email" name="email" class="form-control" placeholder="{% trans 'Enter your email' %}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">{% trans "Phone Number" %} <span class="text-danger">*</span></label>
      <input type="text" name="phone" class="form-control" placeholder="{% trans 'Enter your phone number' %}" required>
    </div>
    <button type="submit" class="btn btn-success w-100">{% trans "Create Account" %}</button>
  </form>
  <p class="text-center mt-3">{% trans "Already have an account?" %} <a href="{% url 'login' %}">{% trans "Login" %}</a></p>
</div>
{% endblock %}
