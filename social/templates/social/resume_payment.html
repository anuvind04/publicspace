{% extends 'social/base.html' %}

{% block content %}
<div class="card p-4 text-center">
  <div style="font-size: 48px;">✅</div>
  <h4 class="mt-3">OTP Verified Successfully!</h4>
  <p class="text-muted">Complete your payment to generate your resume.</p>

  <div class="alert alert-info mt-3">
    <strong>Amount:</strong> ₹50
    <br>
    <strong>Service:</strong> Professional Resume Generation
  </div>

  <button id="pay-btn" class="btn btn-primary w-100 mt-3">Pay ₹50 Now</button>

  <form id="payment-form" method="POST" action="{% url 'resume_payment_success' %}">
    {% csrf_token %}
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_order_id" value="{{ order.id }}">
  </form>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  var options = {
    key: "{{ razorpay_key }}",
    amount: "5000",
    currency: "INR",
    name: "PublicSpace",
    description: "Resume Generation - ₹50",
    order_id: "{{ order.id }}",
    handler: function(response) {
      document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
      document.getElementById('payment-form').submit();
    },
    prefill: {
      name: "{{ request.user.username }}",
      email: "{{ request.user.email }}",
    },
    theme: { color: "#6c63ff" }
  };

  document.getElementById('pay-btn').onclick = function() {
    var rzp = new Razorpay(options);
    rzp.open();
  };
</script>
{% endblock %}
