<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PublicSpace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .navbar-brand { font-weight: 700; color: #6c63ff !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .post-image { width: 100%; max-height: 500px; object-fit: cover; border-radius: 8px; }
    .like-btn { border: none; background: none; cursor: pointer; }
  </style>
</head>
<body>
<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/">PublicSpace</a>
    {% if user.is_authenticated %}
    <div class="d-flex gap-2">
      <a href="{% url 'people' %}" class="btn btn-outline-secondary btn-sm">People</a>
      <a href="{% url 'notifications' %}" class="btn btn-outline-primary btn-sm">Requests</a>
      <a href="{% url 'plans' %}" class="btn btn-outline-success btn-sm">Plans</a>
      <a href="{% url 'resume_create' %}" class="btn btn-outline-warning btn-sm">Resume</a>
      <a href="{% url 'create_post' %}" class="btn btn-primary btn-sm">+ Post</a>
      <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
    {% else %}
    <div class="d-flex gap-2">
      <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Login</a>
      <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Register</a>
    </div>
    {% endif %}
  </div>
</nav>
<div class="container mt-4" style="max-width: 680px;">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
