{% extends 'social/base.html' %}

{% block content %}{% load i18n %}

<div class="card">
  <div class="card-body">
    <h4 class="mb-4">{% trans "Create Post" %}</h4>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">{% trans "Caption" %}</label>
        <textarea name="caption" class="form-control" rows="3" placeholder="{% trans "What's on your mind?" %}"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">{% trans "Photo (optional)" %}</label>
        <input type="file" name="image" class="form-control" accept="image/*">
      </div>
      <div class="mb-3">
        <label class="form-label">{% trans "Video (optional)" %}</label>
        <input type="file" name="video" class="form-control" accept="video/*">
      </div>
      <button type="submit" class="btn btn-primary w-100">{% trans "Post" %}</button>
      <a href="{% url 'feed' %}" class="btn btn-outline-secondary w-100 mt-2">{% trans "Cancel" %}</a>
    </form>
  </div>
</div>
{% endblock %}
