{% extends 'social/base.html' %}

{% block content %}
<div class="card p-4 text-center">
  <div style="font-size: 48px;">🔐</div>
  <h4 class="mt-3">Chrome Login Verification</h4>
  <p class="text-muted">An OTP has been sent to <strong>{{ email }}</strong> to verify your Chrome login.</p>

  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'verify_chrome_otp' %}">
    {% csrf_token %}
    <div class="mb-3 text-start">
      <label class="form-label">Enter OTP</label>
      <input type="text" name="otp" class="form-control text-center"
             placeholder="Enter 6-digit OTP" maxlength="6" required
             style="font-size: 24px; letter-spacing: 8px;">
    </div>
    <button type="submit" class="btn btn-primary w-100">Verify & Login</button>
  </form>

  <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 mt-3">Back to Login</a>
</div>
{% endblock %}
