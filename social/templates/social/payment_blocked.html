{% extends 'social/base.html' %}

{% block content %}
{% load i18n %}
<div class="card p-4 text-center">
  <div style="font-size: 64px;">⏰</div>
  <h4 class="mt-3">Payment Not Available</h4>
  <p class="text-muted mt-2">Payments are only allowed between <strong>10:00 AM - 11:00 AM IST</strong></p>
  <p class="text-danger">Current time: <strong>{{ current_time }}</strong></p>
  <div class="alert alert-warning mt-3">
    Please come back between 10:00 AM and 11:00 AM IST to complete your payment.
  </div>
  <a href="{% url 'plans' %}" class="btn btn-primary mt-2">Back to Plans</a>
</div>
{% endblock %}
